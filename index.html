<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }
    .app {
      background: #fff;
      width: 100%;
      max-width: 460px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    header {
      padding: 24px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
    }
    header h1 {
      font-size: 22px;
      color: #2d2d44;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .count {
      margin-top: 6px;
      font-size: 13px;
      color: #888;
    }
    .input-row {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
    }
    .input-row input {
      flex: 1;
      padding: 12px 14px;
      font-size: 15px;
      border: 2px solid #e6e6ef;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus { border-color: #764ba2; }
    .input-row button {
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: #764ba2;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .input-row button:hover { background: #5e3a86; }
    ul { list-style: none; padding: 0 12px 12px; }
    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      border-radius: 10px;
      transition: background 0.12s;
    }
    li:hover { background: #f7f7fb; }
    li .check {
      width: 22px;
      height: 22px;
      border: 2px solid #cfcfe0;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    li.done .check {
      background: #764ba2;
      border-color: #764ba2;
    }
    li .check svg { width: 14px; height: 14px; opacity: 0; transition: opacity 0.15s; }
    li.done .check svg { opacity: 1; }
    li .label {
      flex: 1;
      font-size: 15px;
      color: #2d2d44;
      cursor: pointer;
      word-break: break-all;
    }
    li.done .label { color: #b0b0c0; text-decoration: line-through; }
    li .del {
      background: none;
      border: none;
      color: #c5c5d4;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    li .del:hover { color: #e2467a; background: #fde8ef; }
    .empty {
      text-align: center;
      color: #b0b0c0;
      padding: 32px 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <div class="count" id="count"></div>
    </header>
    <div class="input-row">
      <input id="itemInput" type="text" placeholder="살 것을 입력하세요..." maxlength="80" autocomplete="off" />
      <button id="addBtn">추가</button>
    </div>
    <ul id="list"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ncvwqewuarlghsjiuife.supabase.co";
    const SUPABASE_KEY = "sb_publishable_0dMeXQQnult2e4-wpvxQ3Q_UOCVnIJB";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const listEl = document.getElementById("list");
    const inputEl = document.getElementById("itemInput");
    const addBtn = document.getElementById("addBtn");
    const countEl = document.getElementById("count");

    let items = [];

    async function load() {
      const { data, error } = await db
        .from("shopping_items")
        .select("*")
        .order("created_at", { ascending: true });
      if (error) {
        console.error("불러오기 실패:", error);
        return;
      }
      items = data || [];
      render();
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      inputEl.focus();
      const { data, error } = await db
        .from("shopping_items")
        .insert({ text, done: false })
        .select()
        .single();
      if (error) {
        console.error("추가 실패:", error);
        return;
      }
      items.push(data);
      render();
    }

    async function toggle(id) {
      const item = items.find((i) => i.id === id);
      if (!item) return;
      const newDone = !item.done;
      item.done = newDone;
      render();
      const { error } = await db
        .from("shopping_items")
        .update({ done: newDone })
        .eq("id", id);
      if (error) {
        console.error("수정 실패:", error);
        item.done = !newDone;
        render();
      }
    }

    async function remove(id) {
      const prev = items;
      items = items.filter((i) => i.id !== id);
      render();
      const { error } = await db
        .from("shopping_items")
        .delete()
        .eq("id", id);
      if (error) {
        console.error("삭제 실패:", error);
        items = prev;
        render();
      }
    }

    function render() {
      listEl.innerHTML = "";

      if (items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "아직 항목이 없습니다. 위에서 추가해 보세요!";
        listEl.appendChild(empty);
      } else {
        items.forEach((item) => {
          const li = document.createElement("li");
          if (item.done) li.classList.add("done");

          const check = document.createElement("div");
          check.className = "check";
          check.innerHTML =
            '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
          check.onclick = () => toggle(item.id);

          const label = document.createElement("span");
          label.className = "label";
          label.textContent = item.text;
          label.onclick = () => toggle(item.id);

          const del = document.createElement("button");
          del.className = "del";
          del.innerHTML = "&times;";
          del.title = "삭제";
          del.onclick = () => remove(item.id);

          li.append(check, label, del);
          listEl.appendChild(li);
        });
      }

      const remaining = items.filter((i) => !i.done).length;
      countEl.textContent =
        items.length === 0
          ? ""
          : `전체 ${items.length}개 · 남은 항목 ${remaining}개`;
    }

    addBtn.onclick = addItem;
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addItem();
    });

    load();
  </script>
</body>
</html>
